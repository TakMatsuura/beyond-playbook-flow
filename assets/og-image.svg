<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060b1a"/>
      <stop offset="0.6" stop-color="#0a1e3d"/>
      <stop offset="1" stop-color="#060b1a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a07d2c"/>
      <stop offset="0.5" stop-color="#f5c542"/>
      <stop offset="1" stop-color="#d4a843"/>
    </linearGradient>
    <linearGradient id="wave1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f5c542" stop-opacity="0.0"/>
      <stop offset="0.5" stop-color="#f5c542" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#f5c542" stop-opacity="0.0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- 波 -->
  <path d="M0,420 Q300,360 600,420 T1200,420 L1200,630 L0,630 Z" fill="#0a1e3d" opacity="0.5"/>
  <path d="M0,480 Q300,420 600,480 T1200,480 L1200,630 L0,630 Z" fill="#060b1a" opacity="0.7"/>
  <!-- 流れる光リボン -->
  <path d="M0,300 Q300,260 600,300 T1200,300" stroke="url(#wave1)" stroke-width="2" fill="none"/>
  <path d="M0,330 Q300,300 600,330 T1200,330" stroke="url(#wave1)" stroke-width="1.5" fill="none" opacity="0.7"/>
  <!-- 中央キラキラ -->
  <circle cx="180" cy="180" r="2" fill="#f5c542" opacity="0.8"/>
  <circle cx="980" cy="140" r="2.5" fill="#f5c542" opacity="0.9"/>
  <circle cx="1100" cy="220" r="1.5" fill="#f5c542" opacity="0.6"/>
  <circle cx="120" cy="280" r="1.5" fill="#f5c542" opacity="0.7"/>
  <circle cx="1050" cy="380" r="2" fill="#f5c542" opacity="0.7"/>
  <!-- FLOWロゴ -->
  <text x="600" y="240" font-family="Inter, Arial, sans-serif" font-weight="900" font-size="140" fill="url(#gold)" text-anchor="middle" letter-spacing="8">FLOW</text>
  <!-- 区切り線 -->
  <line x1="450" y1="280" x2="750" y2="280" stroke="#d4a843" stroke-width="1" opacity="0.5"/>
  <!-- メインコピー -->
  <text x="600" y="345" font-family="'Noto Sans JP', sans-serif" font-weight="900" font-size="56" fill="#ffffff" text-anchor="middle" letter-spacing="4">お金の流れを、止めない。</text>
  <!-- サブコピー -->
  <text x="600" y="405" font-family="'Noto Sans JP', sans-serif" font-weight="500" font-size="26" fill="#e5e3dc" text-anchor="middle" letter-spacing="3">中小企業の資金繰り・銀行交渉・補助金に、1時間以内で動く</text>
  <!-- 下部ブランド -->
  <text x="600" y="570" font-family="Inter, Arial, sans-serif" font-weight="600" font-size="20" fill="#a07d2c" text-anchor="middle" letter-spacing="6">BEYOND PLAYBOOK</text>
  <text x="600" y="600" font-family="'Noto Sans JP', sans-serif" font-weight="400" font-size="16" fill="#9e958a" text-anchor="middle" letter-spacing="2">BEYOND Holdings 株式会社</text>
</svg>
